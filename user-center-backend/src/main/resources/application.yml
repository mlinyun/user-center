spring:
  application:
    # Spring Boot 项目名称
    name: user-center-backend
  profiles:
    # 默认激活的配置文件
    active: dev
  servlet:
    multipart:
      # 开启文件上传
      enabled: true
      # 单个文件最大大小
      max-file-size: 2MB
      # 单次请求最大大小
      max-request-size: 10MB

# 服务器配置
server:
  port: 8100
  # 服务器地址绑定到本地回环地址，仅允许本机访问，禁止外网访问
  address: 127.0.0.1
  servlet:
    session:
      # 会话超时时间，单位秒（24小时）
      timeout: 86400s
    # 应用上下文路径
    context-path: /api
  tomcat:
    threads:
      # Tomcat 最大工作线程数（处理并发请求的线程上限）
      max: 200
      # 保持的最小空闲线程数，用于快速响应新请求
      min-spare: 10
    # 当所有工作线程都被占用时，操作系统内核在接受队列允许排队的最大连接数（等待被 Tomcat 线程取走）。如果队列满，新连接会被拒绝（客户端连接失败或被阻塞）
    accept-count: 100
    # Tomcat 可保持的最大并发连接数（包含正在处理和等待的）
    max-connections: 8192
  compression:
    # 启用 HTTP 响应压缩（Content-Encoding: gzip/deflate），可以显著减少响应体积，减少带宽与客户端加载时间
    enabled: true
    # 指定需要压缩的响应内容类型（MIME 类型）
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
    # 当响应内容的大小（Content-Length）≥ 1024 字节时，Tomcat 才会对响应进行 gzip 压缩
    min-response-size: 1024

# 日志配置
logging:
  file:
    # 日志文件路径
    name: logs/user-center-backend.log
  level:
    # 全局日志级别
    root: info
  logback:
    rollingpolicy:
      # 日志文件存档的最大数量
      max-history: 2000
      # 单个日志文件最大大小
      max-file-size: 5MB

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 开启驼峰命名映射
    map-underscore-to-camel-case: true
    # 使用标准输出来记录 SQL 执行日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # Mapper XML 文件路径
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.mlinyun.usercenter.model
  global-config:
    # 启用 SQL 运行器
    enable-sql-runner: true
    db-config:
      # 设置全局逻辑删除实体字段名
      logic-delete-field: isDeleted
      # 逻辑未删除值
      logic-not-delete-value: 0
      # 逻辑已删除值
      logic-delete-value: 1

# Swagger 配置
springdoc:
  swagger-ui:
    # 自定义Swagger UI HTML 的访问路径
    path: /swagger-ui.html
    # 设置 Swagger UI 中的标签按字母顺序排序
    tags-sorter: alpha
    # 设置 Swagger UI 中的接口按字母顺序排序
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# Knife4j 配置
knife4j:
  # 开启 Knife4j 增强模式
  enable: true
  setting:
    # 设置 Knife4j 的界面语言为中文
    language: zh_cn
  basic:
    # 开启 BasicHttp 校验，保护文档
    enable: true
    username: admin
    password: admin123
