spring:
  devtools:
    restart:
      # 启用自动重启功能（热部署）
      enabled: true
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/user_center?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

# 文件上传配置（开发环境）
file:
  upload:
    # 文件上传根目录（开发环境使用相对路径）
    upload-dir: ./uploads
    # 头像上传子目录
    avatar-dir: avatar
    # 允许的文件类型
    allowed-types: image/jpeg,image/png,image/jpg,image/gif
    # 最大文件大小（字节）2MB
    max-size: 2097152
    # 访问路径前缀
    access-prefix: http://localhost:8100/api/file

logging:
  level:
    root: info

# Knife4j 配置
knife4j:
  # 非生产环境
  production: false
