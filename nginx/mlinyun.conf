# --------------------------
# 主站（www + 顶级域）
# 配置文件位置：/etc/nginx/conf.d/mlinyun.conf
# --------------------------
server {
    listen 443 ssl;
    server_name mlinyun.com www.mlinyun.com;

    # SSL 证书
    ssl_certificate /etc/letsencrypt/live/mlinyun.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mlinyun.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 日志配置
    access_log /var/log/nginx/mlinyun_access.log;
    error_log /var/log/nginx/mlinyun_error.log;

    # 前端根目录
    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }

    error_page   500 502 503 504  /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}