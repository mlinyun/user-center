# --------------------------
# 后端服务器组
# --------------------------
upstream user_center_backend {
    server 127.0.0.1:8100 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# --------------------------
# HTTP 80 → HTTPS 重定向
# --------------------------
server {
    listen 80;
    server_name mlinyun.com www.mlinyun.com;
    return 301 https://$host$request_uri;
}

# --------------------------
# HTTPS 443 配置
# --------------------------
server {
    listen 443 ssl;
    server_name mlinyun.com www.mlinyun.com user-center.mlinyun.com;

    # SSL 证书
    ssl_certificate /etc/letsencrypt/live/mlinyun.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mlinyun.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 日志配置
    access_log /var/log/nginx/user-center-access.log;
    error_log /var/log/nginx/user-center-error.log;

    # gzip config
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 9;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # 前端根目录
    root /var/www/user-center/user-center-react-frontend;
    index index.html;

    # 安全头部配置
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "
      default-src 'self';
      script-src 'self' 'unsafe-inline' https:;
      style-src 'self' 'unsafe-inline' https:;
      img-src 'self' data: https:;
      font-src 'self' https:;
    " always;

    # --------------------------
    # 静态资源缓存
    # --------------------------
    # 静态资源缓存（按需调整）
    location ~* \.(?:css|js|json|xml|txt|map)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 图片资源缓存（按需调整）
    location ~* \.(?:png|jpg|jpeg|gif|svg|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    # --------------------------
    # 安全防护
    # --------------------------
    # 禁止访问隐藏文件（以 . 开头）
    location ~ /\. {
        deny all;
        return 404;
    }

    # 禁止访问特定敏感文件
    location ~* \.(env|git|svn|htaccess|htpasswd|bak|log|sql|zip|tar\.gz)$ {
        deny all;
        return 403;
    }

    # 禁止访问备份文件（如 config.php.bak）
    location ~* \.(bak|old|backup)$ {
        deny all;
        return 403;
    }

    # 禁止目录遍历（Nginx 默认已防，但显式加固更安全）
    location ~* /\.\./ {
        deny all;
        return 403;
    }

    # SPA fallback
    location / {
        # 用于配合 browserHistory使用
        try_files $uri $uri/index.html /index.html;

        # 如果有资源，建议使用 https + http2，配合按需加载可以获得更好的体验
        # rewrite ^/(.*)$ https://preview.pro.ant.design/$1 permanent;

    }

    # --------------------------
    # 后端 API 代理
    # --------------------------
    location /api {
        proxy_pass http://user_center_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时与缓冲（根据后端特性调整）
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 64k;
    }
}