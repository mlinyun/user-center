# 后端服务器组
upstream user_center_backend {
    server 127.0.0.1:8100 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 8081;
    server_name 192.168.27.200;

    # 日志配置
    access_log /var/log/nginx/user-center-access.log;
    error_log /var/log/nginx/user-center-error.log;

    # gzip config
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 9;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    root /var/www/user-center/user-center-react-frontend;
    index index.html;

    # 静态资源缓存（按需调整）
    location ~* \.(?:css|js|json|xml|txt|map)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }
    location ~* \.(?:png|jpg|jpeg|gif|svg|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        # 用于配合 browserHistory使用
        try_files $uri $uri/index.html /index.html;

        # 如果有资源，建议使用 https + http2，配合按需加载可以获得更好的体验
        # rewrite ^/(.*)$ https://preview.pro.ant.design/$1 permanent;

    }

    location /api {
        proxy_pass http://user_center_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时与缓冲（根据后端特性调整）
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 64k;
    }
}