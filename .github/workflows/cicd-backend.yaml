name: User Center Backend CI/CD Workflow
run-name: Backend CI/CD Workflow triggered by ${{ github.actor }} on ${{ github.ref_name }} via ${{ github.event_name }}

on:
  push:
    paths:
      - "user-center-backend/**"
      - ".github/workflows/cicd-backend.yaml"
  pull_request:
    paths:
      - "user-center-backend/**"
      - ".github/workflows/cicd-backend.yaml"
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: user-center-backend

    env:
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      redis:
        image: redis:8.0
        ports:
          - 6379:6379
        options: >-
          --requirepass ${{ env.REDIS_PASSWORD }}
          --health-cmd="redis-cli -a ${{ env.REDIS_PASSWORD }} ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'liberica'
          java-version: '21'
          architecture: x64
          cache: maven

      - name: Run the Maven verify phase
        run: mvn --batch-mode --update-snapshots verify

      - name: Copy JAR to staging
        run: mkdir staging && cp target/*.jar staging

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v7
        with:
          name: user-center-backend-jar
          path: staging
